# CI runs the same commands as the Justfile directly, rather than installing
# just via a third-party action — one less supply-chain dependency. Keep the
# two in sync.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Run tests with race detector
        run: go test -race ./...
      - name: Build the docker module
        run: cd docker && go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Verify lint configuration
        run: golangci-lint config verify
      - name: Lint
        run: golangci-lint run ./...
      - name: Lint the docker module, including its tagged tests
        run: cd docker && golangci-lint run --build-tags docker ./...
      - name: Lint the tagged ssh integration tests
        run: golangci-lint run --build-tags openssh ./ssh/
      - name: Check formatting
        run: golangci-lint fmt --diff ./...
      - name: Check formatting of the docker module
        run: cd docker && golangci-lint fmt --diff ./...
      - name: Check go.mod is tidy
        run: go mod tidy -diff
      - name: Check the docker module's go.mod is tidy
        # Resolved with the workspace off, the way a consumer meets it:
        # against the published core version its go.mod names.
        run: cd docker && GOWORK=off go mod tidy -diff

  windows-build:
    name: Windows cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Cross-build for Windows
        run: GOOS=windows go build ./...
      - name: Cross-build the docker module for Windows
        run: cd docker && GOOS=windows go build ./...

  # The unit lane runs the SSH provider against a server written for these
  # tests, which can only confirm what this repository already believes.
  # These lanes run the same contracts against a real OpenSSH server and a
  # real container, and compare the providers against each other. They need
  # a container runtime, which the Linux runners provide.
  integration:
    name: Integration (${{ matrix.lane }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: openssh
            run: go test -tags openssh -race -timeout 15m ./ssh/
          - lane: docker
            run: cd docker && go test -tags docker -race -timeout 15m ./...
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Confirm a container runtime is available
        run: docker version
      - name: Run the ${{ matrix.lane }} lane
        run: ${{ matrix.run }}

  # Simulates a downstream consumer resolving each module, so module-graph
  # breakage (requires that cannot resolve) surfaces on every commit instead
  # of after a release is tagged.
  #
  # The workspace is removed first: it is what makes the two modules resolve
  # each other during development, and a consumer will not have it.
  consumer-simulation:
    name: Consumer simulation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          path: invoke
      - uses: actions/setup-go@v7
        with:
          go-version-file: invoke/go.mod
      - name: Remove the workspace, which a consumer does not have
        run: rm -f invoke/go.work invoke/go.work.sum
      - name: Build a scratch module that imports the core module
        run: |
          mkdir consumer && cd consumer
          go mod init example.com/consumer
          go mod edit -replace github.com/ruffel/invoke="$GITHUB_WORKSPACE/invoke"
          cat > main.go <<'EOF'
          package main

          import (
            _ "github.com/ruffel/invoke"
            _ "github.com/ruffel/invoke/fake"
            _ "github.com/ruffel/invoke/invoketest"
            _ "github.com/ruffel/invoke/local"
            _ "github.com/ruffel/invoke/ssh"
          )

          func main() {}
          EOF
          go mod tidy
          go build ./...
      # The docker module is deliberately not simulated here. It names the
      # core module by version, and before a release that version does not
      # exist — so the only way to make this step pass would be to replace
      # the core module too, which satisfies the import from the
      # consumer's own graph and never exercises what the submodule
      # actually names. That is a job that cannot fail, which is worse than
      # no job. release-verify.yml asks the question once the tags exist
      # and it can be answered honestly.
