# CI runs the same commands as the Justfile directly, rather than installing
# just via a third-party action — one less supply-chain dependency. Keep the
# two in sync.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests with race detector
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - name: Verify lint configuration
        run: golangci-lint config verify
      - name: Lint
        run: golangci-lint run ./...
      - name: Check formatting
        run: golangci-lint fmt --diff ./...
      - name: Check go.mod is tidy
        run: go mod tidy -diff

  windows-build:
    name: Windows cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cross-build for Windows
        run: GOOS=windows go build ./...

  # Simulates a downstream consumer resolving this module, so module-graph
  # breakage (requires that cannot resolve) surfaces on every commit instead
  # of after a release is tagged.
  consumer-simulation:
    name: Consumer simulation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          path: invoke
      - uses: actions/setup-go@v6
        with:
          go-version-file: invoke/go.mod
      - name: Build a scratch module that imports invoke
        run: |
          mkdir consumer && cd consumer
          go mod init example.com/consumer
          go mod edit -replace github.com/ruffel/invoke="$GITHUB_WORKSPACE/invoke"
          cat > main.go <<'EOF'
          package main

          import _ "github.com/ruffel/invoke"

          func main() {}
          EOF
          go mod tidy
          go build ./...
